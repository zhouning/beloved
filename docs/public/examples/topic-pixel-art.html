<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>像素画编辑器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 { color: #e94560; margin-bottom: 16px; font-size: 24px; }
        .app { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
        .toolbar {
            background: #16213e;
            border-radius: 12px;
            padding: 16px;
            width: 200px;
        }
        .toolbar h3 { margin-bottom: 10px; font-size: 14px; color: #aaa; }
        .color-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px;
            margin-bottom: 12px;
        }
        .color-swatch {
            width: 36px; height: 36px;
            border-radius: 6px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border-color 0.15s, transform 0.15s;
        }
        .color-swatch:hover { transform: scale(1.1); }
        .color-swatch.active { border-color: white; }
        .custom-color { margin-bottom: 12px; }
        .custom-color input { width: 100%; height: 36px; border: none; border-radius: 6px; cursor: pointer; }
        .btn {
            display: block;
            width: 100%;
            padding: 10px;
            margin-bottom: 8px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.85; }
        .btn-eraser { background: #533483; color: white; }
        .btn-random { background: #e94560; color: white; }
        .btn-clear { background: #333; color: #ccc; }
        .btn-export { background: #0f3460; color: white; }
        .btn-fill { background: #16a085; color: white; }
        .canvas-area { display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .pixel-grid {
            display: grid;
            gap: 1px;
            background: #0f0f23;
            border: 2px solid #333;
            border-radius: 4px;
            padding: 1px;
        }
        .pixel {
            width: 24px; height: 24px;
            background: #1a1a2e;
            cursor: crosshair;
            transition: background-color 0.05s;
        }
        .pixel:hover { outline: 2px solid rgba(233,69,96,0.5); outline-offset: -2px; }
        .size-selector { display: flex; gap: 8px; }
        .size-btn {
            padding: 6px 14px;
            background: #16213e;
            color: #aaa;
            border: 1px solid #333;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }
        .size-btn.active { background: #e94560; color: white; border-color: #e94560; }
        .preview { text-align: center; }
        .preview canvas { border: 1px solid #333; border-radius: 4px; image-rendering: pixelated; }
        .preview p { font-size: 12px; color: #666; margin-top: 4px; }
        .hidden-canvas { display: none; }
    </style>
</head>
<body>
    <h1>🎨 像素画编辑器</h1>
    <div class="size-selector">
        <button class="size-btn active" onclick="setSize(16)">16×16</button>
        <button class="size-btn" onclick="setSize(24)">24×24</button>
        <button class="size-btn" onclick="setSize(32)">32×32</button>
    </div>
    <br>
    <div class="app">
        <div class="toolbar">
            <h3>调色板</h3>
            <div class="color-grid" id="palette"></div>
            <div class="custom-color">
                <input type="color" id="customColor" value="#e94560" title="自定义颜色">
            </div>
            <button class="btn btn-eraser" onclick="setEraser()">🧹 橡皮擦</button>
            <button class="btn btn-fill" onclick="setFill()">🪣 油漆桶</button>
            <button class="btn btn-random" onclick="randomCharacter()">🎲 随机角色</button>
            <button class="btn btn-clear" onclick="clearCanvas()">🗑️ 清空画布</button>
            <button class="btn btn-export" onclick="exportPNG()">💾 导出 PNG</button>
            <div class="preview">
                <p>预览</p>
                <canvas id="previewCanvas" width="64" height="64"></canvas>
            </div>
        </div>
        <div class="canvas-area">
            <div class="pixel-grid" id="pixelGrid"></div>
        </div>
    </div>
    <canvas id="exportCanvas" class="hidden-canvas"></canvas>

    <script>
        const COLORS = [
            '#1a1a2e','#e94560','#f39c12','#f1c40f',
            '#2ecc71','#1abc9c','#3498db','#9b59b6',
            '#e74c3c','#e67e22','#27ae60','#2980b9',
            '#8e44ad','#ecf0f1','#bdc3c7','#ffffff'
        ];

        let gridSize = 16;
        let currentColor = '#e94560';
        let isEraser = false;
        let isFillMode = false;
        let isDrawing = false;
        let pixelData = [];

        // 初始化调色板
        function initPalette() {
            const palette = document.getElementById('palette');
            palette.innerHTML = '';
            COLORS.forEach(color => {
                const swatch = document.createElement('div');
                swatch.className = 'color-swatch' + (color === currentColor ? ' active' : '');
                swatch.style.backgroundColor = color;
                swatch.onclick = () => {
                    isEraser = false;
                    isFillMode = false;
                    currentColor = color;
                    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
                    swatch.classList.add('active');
                };
                palette.appendChild(swatch);
            });
        }

        document.getElementById('customColor').addEventListener('input', e => {
            currentColor = e.target.value;
            isEraser = false;
            isFillMode = false;
            document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
        });

        function setEraser() { isEraser = true; isFillMode = false; document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active')); }
        function setFill() { isFillMode = true; isEraser = false; }

        function initGrid() {
            const grid = document.getElementById('pixelGrid');
            grid.innerHTML = '';
            grid.style.gridTemplateColumns = `repeat(${gridSize}, 24px)`;
            grid.style.gridTemplateRows = `repeat(${gridSize}, 24px)`;
            pixelData = Array(gridSize).fill(null).map(() => Array(gridSize).fill('#1a1a2e'));

            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    const pixel = document.createElement('div');
                    pixel.className = 'pixel';
                    pixel.dataset.row = r;
                    pixel.dataset.col = c;
                    pixel.addEventListener('mousedown', e => { e.preventDefault(); isDrawing = true; paint(r, c); });
                    pixel.addEventListener('mouseover', () => { if (isDrawing) paint(r, c); });
                    pixel.addEventListener('mouseup', () => isDrawing = false);
                    grid.appendChild(pixel);
                }
            }
            document.addEventListener('mouseup', () => isDrawing = false);
            updatePreview();
        }

        function paint(r, c) {
            if (isFillMode) { floodFill(r, c, pixelData[r][c], isEraser ? '#1a1a2e' : currentColor); updateAllPixels(); updatePreview(); return; }
            const color = isEraser ? '#1a1a2e' : currentColor;
            pixelData[r][c] = color;
            const idx = r * gridSize + c;
            document.querySelectorAll('.pixel')[idx].style.backgroundColor = color;
            updatePreview();
        }

        function floodFill(r, c, targetColor, fillColor) {
            if (targetColor === fillColor) return;
            if (r < 0 || r >= gridSize || c < 0 || c >= gridSize) return;
            if (pixelData[r][c] !== targetColor) return;
            pixelData[r][c] = fillColor;
            floodFill(r+1, c, targetColor, fillColor);
            floodFill(r-1, c, targetColor, fillColor);
            floodFill(r, c+1, targetColor, fillColor);
            floodFill(r, c-1, targetColor, fillColor);
        }

        function updateAllPixels() {
            const pixels = document.querySelectorAll('.pixel');
            for (let r = 0; r < gridSize; r++)
                for (let c = 0; c < gridSize; c++)
                    pixels[r * gridSize + c].style.backgroundColor = pixelData[r][c];
        }

        function clearCanvas() {
            pixelData = Array(gridSize).fill(null).map(() => Array(gridSize).fill('#1a1a2e'));
            updateAllPixels();
            updatePreview();
        }

        function randomCharacter() {
            clearCanvas();
            const palettes = [
                ['#e94560','#ff6b6b','#c0392b'],
                ['#3498db','#5dade2','#2471a3'],
                ['#2ecc71','#58d68d','#1e8449'],
                ['#f39c12','#f5b041','#d68910'],
                ['#9b59b6','#af7ac5','#7d3c98']
            ];
            const pal = palettes[Math.floor(Math.random() * palettes.length)];
            const hw = Math.floor(gridSize / 2);
            const charH = Math.floor(gridSize * 0.6);
            const offsetY = Math.floor((gridSize - charH) / 2);
            const halfW = Math.floor(hw * 0.7);
            const offsetX = hw - halfW;

            // 生成左半边随机形状
            for (let r = offsetY; r < offsetY + charH; r++) {
                for (let c = offsetX; c < hw; c++) {
                    if (Math.random() > 0.45) {
                        const color = pal[Math.floor(Math.random() * pal.length)];
                        pixelData[r][c] = color;
                        pixelData[r][gridSize - 1 - c] = color; // 镜像
                    }
                }
            }
            // 画眼睛
            const eyeY = offsetY + Math.floor(charH * 0.3);
            const eyeX1 = hw - Math.floor(halfW * 0.4);
            const eyeX2 = gridSize - 1 - eyeX1;
            if (eyeY < gridSize && eyeX1 < gridSize && eyeX2 < gridSize) {
                pixelData[eyeY][eyeX1] = '#ffffff';
                pixelData[eyeY][eyeX2] = '#ffffff';
            }
            updateAllPixels();
            updatePreview();
        }

        function updatePreview() {
            const canvas = document.getElementById('previewCanvas');
            const ctx = canvas.getContext('2d');
            const scale = 64 / gridSize;
            canvas.width = 64; canvas.height = 64;
            ctx.imageSmoothingEnabled = false;
            for (let r = 0; r < gridSize; r++)
                for (let c = 0; c < gridSize; c++) {
                    ctx.fillStyle = pixelData[r][c];
                    ctx.fillRect(c * scale, r * scale, scale, scale);
                }
        }

        function exportPNG() {
            const scale = 16;
            const canvas = document.getElementById('exportCanvas');
            canvas.width = gridSize * scale;
            canvas.height = gridSize * scale;
            const ctx = canvas.getContext('2d');
            ctx.imageSmoothingEnabled = false;
            for (let r = 0; r < gridSize; r++)
                for (let c = 0; c < gridSize; c++) {
                    ctx.fillStyle = pixelData[r][c];
                    ctx.fillRect(c * scale, r * scale, scale, scale);
                }
            const link = document.createElement('a');
            link.download = 'pixel-art.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        function setSize(size) {
            gridSize = size;
            document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            initGrid();
        }

        initPalette();
        initGrid();
    </script>
</body>
</html>

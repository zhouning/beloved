<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>表情包生成器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 { color: white; margin-bottom: 16px; font-size: 24px; }
        .app { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
        .canvas-area {
            background: #2d2d2d;
            border-radius: 16px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        canvas { border-radius: 8px; cursor: pointer; }
        .controls {
            background: white;
            border-radius: 16px;
            padding: 20px;
            width: 280px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }
        .controls h3 { margin-bottom: 10px; color: #333; font-size: 15px; }
        .templates {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }
        .template-btn {
            aspect-ratio: 1;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .template-btn:hover { border-color: #764ba2; transform: scale(1.05); }
        .template-btn.active { border-color: #764ba2; background: #f3e8ff; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 13px; color: #666; margin-bottom: 4px; }
        .form-group input[type="text"], .form-group textarea {
            width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px;
        }
        .form-group input[type="range"] { width: 100%; }
        .form-group textarea { min-height: 40px; resize: none; font-family: inherit; }
        .row { display: flex; gap: 8px; }
        .row > * { flex: 1; }
        .quick-texts {
            display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 12px;
        }
        .quick-text {
            padding: 4px 10px; background: #f0f0f0; border: none; border-radius: 12px;
            cursor: pointer; font-size: 12px; transition: background 0.15s;
        }
        .quick-text:hover { background: #e0d4f5; }
        .btn {
            width: 100%; padding: 12px; border: none; border-radius: 10px;
            font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 6px;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.85; }
        .btn-export { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .btn-random { background: #ff6b6b; color: white; }
        .sticker-panel { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 12px; }
        .sticker-btn {
            width: 36px; height: 36px; border: 1px solid #eee; border-radius: 6px;
            background: white; cursor: pointer; font-size: 20px;
            display: flex; align-items: center; justify-content: center;
        }
        .sticker-btn:hover { background: #f3e8ff; }
    </style>
</head>
<body>
    <h1>😂 表情包生成器</h1>
    <div class="app">
        <div class="canvas-area">
            <canvas id="memeCanvas" width="400" height="400"></canvas>
        </div>
        <div class="controls">
            <h3>选择模板</h3>
            <div class="templates">
                <button class="template-btn active" onclick="setTemplate(0)" title="渐变+Emoji">😎</button>
                <button class="template-btn" onclick="setTemplate(1)" title="上下对比">⬆️</button>
                <button class="template-btn" onclick="setTemplate(2)" title="纯色大字">📝</button>
                <button class="template-btn" onclick="setTemplate(3)" title="对话气泡">💬</button>
                <button class="template-btn" onclick="setTemplate(4)" title="警告风格">⚠️</button>
                <button class="template-btn" onclick="setTemplate(5)" title="自定义图片">🖼️</button>
            </div>

            <h3>快捷文字</h3>
            <div class="quick-texts">
                <button class="quick-text" onclick="setTopText('就这？')">就这？</button>
                <button class="quick-text" onclick="setTopText('绝了')">绝了</button>
                <button class="quick-text" onclick="setTopText('学到了')">学到了</button>
                <button class="quick-text" onclick="setTopText('我裂开了')">我裂开了</button>
                <button class="quick-text" onclick="setTopText('好家伙')">好家伙</button>
                <button class="quick-text" onclick="setBottomText('真实')">真实</button>
                <button class="quick-text" onclick="setBottomText('破防了')">破防了</button>
                <button class="quick-text" onclick="setBottomText('不愧是你')">不愧是你</button>
            </div>

            <div class="form-group">
                <label>顶部文字</label>
                <input type="text" id="topText" placeholder="输入顶部文字..." oninput="render()">
            </div>
            <div class="form-group">
                <label>底部文字</label>
                <input type="text" id="bottomText" placeholder="输入底部文字..." oninput="render()">
            </div>
            <div class="row">
                <div class="form-group">
                    <label>字号: <span id="sizeLabel">36</span>px</label>
                    <input type="range" id="fontSize" min="16" max="72" value="36" oninput="document.getElementById('sizeLabel').textContent=this.value;render()">
                </div>
                <div class="form-group">
                    <label>字色</label>
                    <input type="color" id="fontColor" value="#ffffff" oninput="render()" style="width:100%;height:32px;border:none;border-radius:6px;">
                </div>
            </div>

            <h3>贴纸</h3>
            <div class="sticker-panel">
                <button class="sticker-btn" onclick="addSticker('😂')">😂</button>
                <button class="sticker-btn" onclick="addSticker('🤣')">🤣</button>
                <button class="sticker-btn" onclick="addSticker('😭')">😭</button>
                <button class="sticker-btn" onclick="addSticker('🔥')">🔥</button>
                <button class="sticker-btn" onclick="addSticker('💀')">💀</button>
                <button class="sticker-btn" onclick="addSticker('👍')">👍</button>
                <button class="sticker-btn" onclick="addSticker('❤️')">❤️</button>
                <button class="sticker-btn" onclick="addSticker('⭐')">⭐</button>
                <button class="sticker-btn" onclick="addSticker('🎉')">🎉</button>
                <button class="sticker-btn" onclick="addSticker('💪')">💪</button>
                <button class="sticker-btn" onclick="addSticker('🤔')">🤔</button>
                <button class="sticker-btn" onclick="addSticker('😱')">😱</button>
            </div>

            <input type="file" id="imageUpload" accept="image/*" style="display:none" onchange="loadImage(event)">
            <button class="btn btn-random" onclick="randomMeme()">🎲 随机生成</button>
            <button class="btn btn-export" onclick="exportMeme()">💾 导出图片</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('memeCanvas');
        const ctx = canvas.getContext('2d');
        let currentTemplate = 0;
        let uploadedImage = null;
        let stickers = [];

        const BG_EMOJIS = ['😎','🤡','👻','🐶','😤','🥺'];
        const GRADIENTS = [
            ['#667eea','#764ba2'], ['#f093fb','#f5576c'], ['#4facfe','#00f2fe'],
            ['#43e97b','#38f9d7'], ['#fa709a','#fee140'], ['#a18cd1','#fbc2eb']
        ];

        function setTemplate(idx) {
            currentTemplate = idx;
            document.querySelectorAll('.template-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
            if (idx === 5) document.getElementById('imageUpload').click();
            stickers = [];
            render();
        }

        function setTopText(t) { document.getElementById('topText').value = t; render(); }
        function setBottomText(t) { document.getElementById('bottomText').value = t; render(); }

        function loadImage(e) {
            const file = e.target.files[0];
            if (!file) return;
            const img = new Image();
            img.onload = () => { uploadedImage = img; render(); };
            img.src = URL.createObjectURL(file);
        }

        function addSticker(emoji) {
            stickers.push({ emoji, x: 100 + Math.random()*200, y: 100 + Math.random()*200, size: 48 });
            render();
        }

        function drawBackground() {
            const w = canvas.width, h = canvas.height;
            if (currentTemplate === 5 && uploadedImage) {
                const scale = Math.max(w / uploadedImage.width, h / uploadedImage.height);
                const sw = uploadedImage.width * scale, sh = uploadedImage.height * scale;
                ctx.drawImage(uploadedImage, (w-sw)/2, (h-sh)/2, sw, sh);
                return;
            }

            const grad = GRADIENTS[currentTemplate % GRADIENTS.length];
            const g = ctx.createLinearGradient(0, 0, w, h);
            g.addColorStop(0, grad[0]); g.addColorStop(1, grad[1]);
            ctx.fillStyle = g; ctx.fillRect(0, 0, w, h);

            if (currentTemplate === 0) {
                ctx.font = '120px serif';
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(BG_EMOJIS[Math.floor(Math.random()*0.99*BG_EMOJIS.length)] || '😎', w/2, h/2);
            } else if (currentTemplate === 1) {
                ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(0, h/2, w, h/2);
                ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(0, h/2); ctx.lineTo(w, h/2); ctx.stroke();
            } else if (currentTemplate === 2) {
                // 纯色，已画
            } else if (currentTemplate === 3) {
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.ellipse(w/2, h*0.4, 150, 100, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(w/2-20, h*0.5+50); ctx.lineTo(w/2-50, h*0.65); ctx.lineTo(w/2+10, h*0.5+50);
                ctx.fill();
            } else if (currentTemplate === 4) {
                ctx.fillStyle = '#000'; ctx.fillRect(0, 0, w, h);
                ctx.fillStyle = '#ffcc00'; ctx.fillRect(10, 10, w-20, h-20);
                ctx.fillStyle = '#000'; ctx.fillRect(20, 20, w-40, h-40);
            }
        }

        function drawText() {
            const w = canvas.width, h = canvas.height;
            const top = document.getElementById('topText').value;
            const bottom = document.getElementById('bottomText').value;
            const size = parseInt(document.getElementById('fontSize').value);
            const color = document.getElementById('fontColor').value;

            ctx.font = `bold ${size}px Impact, "Microsoft YaHei", sans-serif`;
            ctx.textAlign = 'center';
            ctx.fillStyle = color;
            ctx.strokeStyle = '#000';
            ctx.lineWidth = Math.max(2, size / 12);
            ctx.lineJoin = 'round';

            if (currentTemplate === 3) {
                // 气泡内文字用深色
                ctx.fillStyle = '#333'; ctx.strokeStyle = '#333'; ctx.lineWidth = 0;
                ctx.font = `bold ${Math.min(size, 28)}px "Microsoft YaHei", sans-serif`;
                if (top) ctx.fillText(top, w/2, h*0.4, 250);
                ctx.fillStyle = color; ctx.strokeStyle = '#000'; ctx.lineWidth = Math.max(2, size/12);
                ctx.font = `bold ${size}px Impact, "Microsoft YaHei", sans-serif`;
                if (bottom) { ctx.strokeText(bottom, w/2, h - 30); ctx.fillText(bottom, w/2, h - 30); }
            } else {
                if (top) { ctx.strokeText(top, w/2, size + 20); ctx.fillText(top, w/2, size + 20); }
                if (bottom) { ctx.strokeText(bottom, w/2, h - 20); ctx.fillText(bottom, w/2, h - 20); }
            }
        }

        function drawStickers() {
            stickers.forEach(s => {
                ctx.font = `${s.size}px serif`;
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(s.emoji, s.x, s.y);
            });
        }

        // 缓存背景 emoji 选择
        let bgEmojiIdx = 0;
        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // 固定 emoji 以避免每次 render 换
            const savedRand = Math.random;
            Math.random = () => bgEmojiIdx / BG_EMOJIS.length;
            drawBackground();
            Math.random = savedRand;
            drawText();
            drawStickers();
        }

        function randomMeme() {
            bgEmojiIdx = Math.floor(Math.random() * BG_EMOJIS.length);
            currentTemplate = Math.floor(Math.random() * 5);
            document.querySelectorAll('.template-btn').forEach((b,i) => b.classList.toggle('active', i===currentTemplate));
            const tops = ['就这？','绝了','好家伙','学到了','我裂开了','真的假的','太强了'];
            const bots = ['真实','破防了','不愧是你','DNA动了','人麻了','笑不活了'];
            document.getElementById('topText').value = tops[Math.floor(Math.random()*tops.length)];
            document.getElementById('bottomText').value = bots[Math.floor(Math.random()*bots.length)];
            stickers = [];
            if (Math.random() > 0.5) addSticker(['😂','🔥','💀','⭐','🤣'][Math.floor(Math.random()*5)]);
            render();
        }

        function exportMeme() {
            const link = document.createElement('a');
            link.download = 'meme.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        bgEmojiIdx = 0;
        render();
    </script>
</body>
</html>

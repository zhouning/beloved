<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>记忆翻牌游戏</title>
<style>
/* ========== 全局样式 ========== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(135deg, #e8d5f5 0%, #f5d5e0 50%, #d5e0f5 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
}

/* ========== 标题区域 ========== */
h1 {
  font-size: 2rem;
  color: #6b3fa0;
  margin-bottom: 8px;
  text-shadow: 1px 1px 2px rgba(107, 63, 160, 0.2);
}

.subtitle {
  color: #9b7cc0;
  font-size: 0.95rem;
  margin-bottom: 20px;
}

/* ========== 信息栏 ========== */
.info-bar {
  display: flex;
  gap: 24px;
  margin-bottom: 20px;
  flex-wrap: wrap;
  justify-content: center;
}

.info-item {
  background: rgba(255,255,255,0.85);
  padding: 8px 20px;
  border-radius: 20px;
  font-size: 0.95rem;
  color: #6b3fa0;
  box-shadow: 0 2px 8px rgba(107,63,160,0.1);
  display: flex;
  align-items: center;
  gap: 6px;
}

.info-item .label {
  font-weight: 600;
}

.info-item .value {
  color: #d63384;
  font-weight: 700;
  min-width: 28px;
  text-align: center;
}

/* ========== 游戏面板 ========== */
.game-board {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  max-width: 440px;
  width: 100%;
  margin-bottom: 24px;
}

/* ========== 卡片样式 ========== */
.card {
  aspect-ratio: 1;
  perspective: 600px;
  cursor: pointer;
}

.card-inner {
  position: relative;
  width: 100%;
  height: 100%;
  transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  transform-style: preserve-3d;
}

/* 翻转状态 */
.card.flipped .card-inner {
  transform: rotateY(180deg);
}

/* 卡片正反面公共样式 */
.card-front, .card-back {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* 卡片背面（初始可见） */
.card-front {
  background: linear-gradient(135deg, #9b59b6, #c471ed);
  box-shadow: 0 4px 15px rgba(155, 89, 182, 0.35);
  font-size: 1.8rem;
  color: rgba(255,255,255,0.7);
}

.card-front::after {
  content: '?';
  font-weight: 700;
  font-size: 2rem;
}

/* 悬停效果 */
.card:not(.flipped):not(.matched):hover .card-inner {
  transform: translateY(-4px);
  filter: brightness(1.05);
}

.card:not(.flipped):not(.matched):hover .card-front {
  box-shadow: 0 8px 25px rgba(155, 89, 182, 0.5);
}

/* 卡片正面（emoji 面） */
.card-back {
  background: #fff;
  transform: rotateY(180deg);
  font-size: 2.6rem;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

/* 匹配成功动画 */
.card.matched .card-back {
  animation: glowPulse 1.5s ease-in-out infinite;
  box-shadow: 0 0 20px rgba(155, 89, 182, 0.5), 0 0 40px rgba(155, 89, 182, 0.2);
}

@keyframes glowPulse {
  0%, 100% { box-shadow: 0 0 15px rgba(155,89,182,0.4), 0 0 30px rgba(155,89,182,0.15); }
  50% { box-shadow: 0 0 25px rgba(155,89,182,0.6), 0 0 50px rgba(155,89,182,0.3); }
}

/* 不匹配时的抖动动画 */
.card.shake .card-inner {
  animation: shakeCard 0.5s ease-in-out;
}

@keyframes shakeCard {
  0%, 100% { transform: rotateY(180deg) translateX(0); }
  20% { transform: rotateY(180deg) translateX(-8px); }
  40% { transform: rotateY(180deg) translateX(8px); }
  60% { transform: rotateY(180deg) translateX(-5px); }
  80% { transform: rotateY(180deg) translateX(5px); }
}

/* ========== 重新开始按钮 ========== */
.restart-btn {
  background: linear-gradient(135deg, #9b59b6, #c471ed);
  color: #fff;
  border: none;
  padding: 12px 36px;
  border-radius: 25px;
  font-size: 1.05rem;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 4px 15px rgba(155,89,182,0.3);
}

.restart-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(155,89,182,0.45);
}

/* ========== 胜利弹窗 ========== */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 100;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
}

.modal-overlay.show {
  display: flex;
}

.modal {
  background: #fff;
  border-radius: 24px;
  padding: 40px;
  text-align: center;
  max-width: 380px;
  width: 90%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  animation: modalPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes modalPop {
  from { transform: scale(0.6); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.modal h2 {
  font-size: 1.8rem;
  color: #6b3fa0;
  margin-bottom: 8px;
}

.modal .stars {
  font-size: 2.5rem;
  margin: 12px 0;
}

.modal .stat {
  font-size: 1rem;
  color: #666;
  margin: 6px 0;
}

.modal .stat strong {
  color: #d63384;
}

.modal .restart-btn {
  margin-top: 20px;
}

/* ========== 响应式 ========== */
@media (max-width: 480px) {
  .game-board {
    gap: 8px;
    max-width: 340px;
  }
  .card-back {
    font-size: 2rem;
  }
  h1 {
    font-size: 1.5rem;
  }
  .info-bar {
    gap: 12px;
  }
  .info-item {
    padding: 6px 14px;
    font-size: 0.85rem;
  }
  .modal {
    padding: 28px;
  }
}
</style>
</head>
<body>

<h1>记忆翻牌游戏</h1>
<p class="subtitle">翻开卡片，找到所有配对！</p>

<!-- 信息栏：翻牌次数、用时、已找到配对数 -->
<div class="info-bar">
  <div class="info-item">
    <span class="label">翻牌：</span>
    <span class="value" id="flipCount">0</span>
  </div>
  <div class="info-item">
    <span class="label">用时：</span>
    <span class="value" id="timer">0:00</span>
  </div>
  <div class="info-item">
    <span class="label">配对：</span>
    <span class="value" id="pairCount">0 / 8</span>
  </div>
</div>

<!-- 游戏面板（16 张卡片由 JS 生成） -->
<div class="game-board" id="gameBoard"></div>

<!-- 重新开始按钮 -->
<button class="restart-btn" onclick="initGame()">再玩一次</button>

<!-- 胜利弹窗 -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>恭喜通关！</h2>
    <div class="stars" id="stars"></div>
    <p class="stat">翻牌次数：<strong id="finalFlips"></strong></p>
    <p class="stat">用时：<strong id="finalTime"></strong></p>
    <button class="restart-btn" onclick="closeModal(); initGame();">再玩一次</button>
  </div>
</div>

<script>
/* ========== 游戏用到的 emoji 池 ========== */
const EMOJIS = ['🐱','🐶','🦊','🐼','🐸','🦋','🌟','🎈','🍕','🎸','🚀','🌈','🍦','🎯','🐳','🦄'];

/* ========== 游戏状态变量 ========== */
let cards = [];          // 当前卡片数组
let flippedCards = [];   // 当前翻开的卡片（最多 2 张）
let matchedPairs = 0;    // 已配对数
let flipCount = 0;       // 翻牌总次数
let timerInterval = null;// 计时器引用
let secondsElapsed = 0;  // 已过秒数
let timerStarted = false;// 计时器是否已启动
let lockBoard = false;   // 是否锁定面板（防止快速点击）

/* ========== Web Audio API 音效 ========== */
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

/**
 * 确保 AudioContext 已创建
 * 浏览器要求必须在用户交互后才能创建
 */
function ensureAudio() {
  if (!audioCtx) {
    audioCtx = new AudioCtx();
  }
}

/**
 * 播放简单音效
 * @param {number} freq - 起始频率
 * @param {string} type - 波形类型
 * @param {number} duration - 持续时间（秒）
 * @param {number} endFreq - 结束频率（可选，用于滑音）
 */
function playTone(freq, type, duration, endFreq) {
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  if (endFreq) {
    osc.frequency.linearRampToValueAtTime(endFreq, audioCtx.currentTime + duration);
  }
  gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

// 翻牌音效：短促的清脆声
function soundFlip() { playTone(600, 'sine', 0.1, 800); }
// 配对成功音效：上升的愉悦声
function soundMatch() {
  playTone(523, 'sine', 0.15);
  setTimeout(() => playTone(659, 'sine', 0.15), 100);
  setTimeout(() => playTone(784, 'sine', 0.2), 200);
}
// 配对失败音效：低沉的提示声
function soundFail() { playTone(300, 'triangle', 0.25, 200); }
// 胜利音效：一段小旋律
function soundWin() {
  const notes = [523, 587, 659, 784, 880, 1047];
  notes.forEach((n, i) => setTimeout(() => playTone(n, 'sine', 0.2), i * 120));
}

/* ========== 洗牌算法（Fisher-Yates） ========== */
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

/* ========== 初始化游戏 ========== */
function initGame() {
  // 重置所有状态
  matchedPairs = 0;
  flipCount = 0;
  secondsElapsed = 0;
  timerStarted = false;
  lockBoard = false;
  flippedCards = [];
  clearInterval(timerInterval);

  // 更新显示
  document.getElementById('flipCount').textContent = '0';
  document.getElementById('timer').textContent = '0:00';
  document.getElementById('pairCount').textContent = '0 / 8';

  // 随机选 8 个 emoji，复制一份凑成 16 张，再洗牌
  const selected = shuffle([...EMOJIS]).slice(0, 8);
  cards = shuffle([...selected, ...selected]);

  // 生成卡片 DOM
  const board = document.getElementById('gameBoard');
  board.innerHTML = '';
  cards.forEach((emoji, index) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.index = index;
    card.dataset.emoji = emoji;
    card.innerHTML = `
      <div class="card-inner">
        <div class="card-front"></div>
        <div class="card-back">${emoji}</div>
      </div>
    `;
    card.addEventListener('click', () => flipCard(card));
    board.appendChild(card);
  });
}

/* ========== 翻牌逻辑 ========== */
function flipCard(card) {
  // 如果面板锁定、卡片已翻开或已配对，则忽略点击
  if (lockBoard) return;
  if (card.classList.contains('flipped')) return;
  if (card.classList.contains('matched')) return;

  // 第一次翻牌时启动计时器
  if (!timerStarted) {
    timerStarted = true;
    timerInterval = setInterval(() => {
      secondsElapsed++;
      const min = Math.floor(secondsElapsed / 60);
      const sec = secondsElapsed % 60;
      document.getElementById('timer').textContent =
        `${min}:${sec.toString().padStart(2, '0')}`;
    }, 1000);
  }

  // 翻开卡片
  card.classList.add('flipped');
  flippedCards.push(card);
  flipCount++;
  document.getElementById('flipCount').textContent = flipCount;
  soundFlip();

  // 翻开两张时进行比较
  if (flippedCards.length === 2) {
    lockBoard = true; // 锁定面板
    const [a, b] = flippedCards;

    if (a.dataset.emoji === b.dataset.emoji) {
      // 配对成功
      a.classList.add('matched');
      b.classList.add('matched');
      matchedPairs++;
      document.getElementById('pairCount').textContent = `${matchedPairs} / 8`;
      soundMatch();
      flippedCards = [];
      lockBoard = false;

      // 检查是否全部配对
      if (matchedPairs === 8) {
        clearInterval(timerInterval);
        setTimeout(showVictory, 600);
      }
    } else {
      // 配对失败：抖动后翻回
      soundFail();
      a.classList.add('shake');
      b.classList.add('shake');
      setTimeout(() => {
        a.classList.remove('flipped', 'shake');
        b.classList.remove('flipped', 'shake');
        flippedCards = [];
        lockBoard = false;
      }, 1000);
    }
  }
}

/* ========== 胜利弹窗 ========== */
function showVictory() {
  soundWin();
  const min = Math.floor(secondsElapsed / 60);
  const sec = secondsElapsed % 60;
  const timeStr = `${min}:${sec.toString().padStart(2, '0')}`;

  // 根据翻牌次数评星
  let starCount;
  if (flipCount <= 12) starCount = 3;
  else if (flipCount <= 18) starCount = 2;
  else starCount = 1;

  document.getElementById('stars').textContent = '⭐'.repeat(starCount) + '☆'.repeat(3 - starCount);
  document.getElementById('finalFlips').textContent = flipCount;
  document.getElementById('finalTime').textContent = timeStr;
  document.getElementById('modalOverlay').classList.add('show');
}

/* 关闭弹窗 */
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

// 点击弹窗外部关闭
document.getElementById('modalOverlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeModal();
});

// 页面加载后初始化游戏
initGame();
</script>
</body>
</html>

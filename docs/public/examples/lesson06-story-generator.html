<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>创意故事生成器</title>
<style>
/* ========== 全局样式 ========== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  min-height: 100vh;
  background: linear-gradient(135deg, #fdf6f0 0%, #f0e6f6 100%);
  padding: 24px;
}

/* ========== 容器 ========== */
.container {
  max-width: 720px;
  margin: 0 auto;
}

/* ========== 标题 ========== */
h1 {
  text-align: center;
  font-size: 2.2rem;
  color: #5b3a8c;
  margin-bottom: 6px;
}

.subtitle {
  text-align: center;
  color: #9a7cc0;
  font-size: 1rem;
  margin-bottom: 28px;
}

/* ========== 输入区域 ========== */
.input-section {
  background: #fff;
  border-radius: 20px;
  padding: 28px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.06);
  margin-bottom: 24px;
}

.input-section label {
  display: block;
  font-weight: 600;
  color: #5b3a8c;
  margin-bottom: 8px;
  font-size: 1rem;
}

.name-input {
  width: 100%;
  padding: 12px 18px;
  border: 2px solid #e0d0f0;
  border-radius: 12px;
  font-size: 1rem;
  outline: none;
  transition: border-color 0.3s;
}

.name-input:focus {
  border-color: #9b59b6;
}

/* ========== 故事类型选择 ========== */
.type-label {
  margin-top: 20px;
}

.type-buttons {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  margin-top: 8px;
}

.type-btn {
  padding: 14px;
  border: 2px solid transparent;
  border-radius: 14px;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
  display: flex;
  align-items: center;
  gap: 8px;
  justify-content: center;
}

.type-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

.type-btn.selected {
  border-color: currentColor;
  transform: translateY(-2px);
  box-shadow: 0 4px 15px rgba(0,0,0,0.12);
}

/* 四种类型的配色 */
.type-btn.fantasy {
  background: linear-gradient(135deg, #f3e7ff, #e8d5ff);
  color: #7b2fbe;
}
.type-btn.space {
  background: linear-gradient(135deg, #dbe9ff, #c5d5f7);
  color: #2a4f9e;
}
.type-btn.school {
  background: linear-gradient(135deg, #e0f7e9, #c8f0d4);
  color: #2d8a4e;
}
.type-btn.animal {
  background: linear-gradient(135deg, #fff3e0, #ffe5c0);
  color: #c67600;
}

/* ========== 生成按钮 ========== */
.generate-btn {
  display: block;
  width: 100%;
  margin-top: 20px;
  padding: 14px;
  background: linear-gradient(135deg, #9b59b6, #c471ed);
  color: #fff;
  border: none;
  border-radius: 14px;
  font-size: 1.1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 4px 15px rgba(155,89,182,0.3);
}

.generate-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(155,89,182,0.45);
}

.generate-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

/* ========== 故事展示区域 ========== */
.story-section {
  display: none;
  margin-top: 8px;
}

.story-section.show {
  display: block;
}

.story-card {
  background: #fffdf7;
  border-radius: 20px;
  padding: 36px 32px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.07);
  position: relative;
  /* 书页装饰边框 */
  border: 1px solid #e8dcc8;
}

/* 装饰性顶部花纹 */
.story-card::before {
  content: '~ ✦ ~';
  display: block;
  text-align: center;
  color: #cdb99c;
  font-size: 1.2rem;
  letter-spacing: 12px;
  margin-bottom: 20px;
}

.story-title {
  text-align: center;
  font-family: 'Georgia', 'Noto Serif SC', 'SimSun', serif;
  font-size: 1.5rem;
  color: #5b3a2e;
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: 1px solid #e8dcc8;
}

.story-body {
  font-family: 'Georgia', 'Noto Serif SC', 'SimSun', serif;
  font-size: 1.05rem;
  color: #4a3a30;
  line-height: 2;
  min-height: 120px;
}

.story-body p {
  text-indent: 2em;
  margin-bottom: 16px;
}

/* 段落分隔符 */
.story-body .separator {
  text-align: center;
  color: #cdb99c;
  margin: 20px 0;
  letter-spacing: 8px;
  font-size: 0.9rem;
}

/* 底部装饰 */
.story-card::after {
  content: '— 全文完 —';
  display: block;
  text-align: center;
  color: #cdb99c;
  font-size: 0.9rem;
  margin-top: 24px;
  padding-top: 16px;
  border-top: 1px solid #e8dcc8;
  opacity: 0;
  transition: opacity 0.5s;
}

.story-card.finished::after {
  opacity: 1;
}

/* ========== 操作按钮 ========== */
.action-buttons {
  display: flex;
  gap: 12px;
  margin-top: 16px;
  justify-content: center;
  flex-wrap: wrap;
}

.action-btn {
  padding: 10px 24px;
  border-radius: 12px;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
  border: none;
}

.copy-btn {
  background: #fff;
  color: #5b3a8c;
  border: 2px solid #d0b8e8;
}

.copy-btn:hover {
  background: #f3e7ff;
}

.regen-btn {
  background: linear-gradient(135deg, #9b59b6, #c471ed);
  color: #fff;
  box-shadow: 0 3px 10px rgba(155,89,182,0.25);
}

.regen-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(155,89,182,0.4);
}

/* 复制成功提示 */
.copy-toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: #5b3a8c;
  color: #fff;
  padding: 10px 24px;
  border-radius: 10px;
  font-size: 0.95rem;
  opacity: 0;
  transition: all 0.3s;
  pointer-events: none;
  z-index: 99;
}

.copy-toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ========== 打字光标 ========== */
.cursor {
  display: inline-block;
  width: 2px;
  height: 1.1em;
  background: #5b3a8c;
  margin-left: 2px;
  animation: blink 0.8s step-end infinite;
  vertical-align: text-bottom;
}

@keyframes blink {
  50% { opacity: 0; }
}

/* ========== 响应式 ========== */
@media (max-width: 480px) {
  body { padding: 16px; }
  h1 { font-size: 1.6rem; }
  .input-section { padding: 20px; }
  .type-buttons { grid-template-columns: 1fr; }
  .story-card { padding: 24px 20px; }
  .story-title { font-size: 1.25rem; }
  .story-body { font-size: 0.95rem; }
}
</style>
</head>
<body>

<div class="container">
  <h1>创意故事生成器</h1>
  <p class="subtitle">输入名字，选择主题，一键生成你的专属故事！</p>

  <!-- 输入区域 -->
  <div class="input-section">
    <label for="heroName">主角名字</label>
    <input type="text" id="heroName" class="name-input" placeholder="请输入主角的名字，比如：小明" maxlength="10">

    <label class="type-label">选择故事类型</label>
    <div class="type-buttons">
      <button class="type-btn fantasy selected" data-type="fantasy" onclick="selectType(this)">
        🧙 奇幻冒险
      </button>
      <button class="type-btn space" data-type="space" onclick="selectType(this)">
        🚀 太空探索
      </button>
      <button class="type-btn school" data-type="school" onclick="selectType(this)">
        🏫 校园趣事
      </button>
      <button class="type-btn animal" data-type="animal" onclick="selectType(this)">
        🐾 动物王国
      </button>
    </div>

    <button class="generate-btn" id="generateBtn" onclick="generateStory()">生成故事</button>
  </div>

  <!-- 故事展示 -->
  <div class="story-section" id="storySection">
    <div class="story-card" id="storyCard">
      <h2 class="story-title" id="storyTitle"></h2>
      <div class="story-body" id="storyBody"></div>
    </div>
    <div class="action-buttons">
      <button class="action-btn copy-btn" onclick="copyStory()">复制故事</button>
      <button class="action-btn regen-btn" onclick="generateStory()">再生成一个</button>
    </div>
  </div>
</div>

<!-- 复制成功提示 -->
<div class="copy-toast" id="copyToast">已复制到剪贴板！</div>

<script>
/* ========== 当前选中的故事类型 ========== */
let currentType = 'fantasy';
let isTyping = false; // 是否正在打字
let typewriterTimer = null; // 打字定时器引用

/**
 * 选择故事类型
 */
function selectType(btn) {
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  currentType = btn.dataset.type;
}

/* ========== 故事素材库 ========== */
const storyData = {
  /* ---- 奇幻冒险 ---- */
  fantasy: {
    titles: ['魔法森林的秘密', '龙之守护者', '时光水晶传说', '星辰魔法师', '失落的精灵王国', '月光宝石之谜'],
    openings: [

      '{name}走进学校后面那片从没人去过的小树林，忽然脚下的地面变成了闪闪发光的水晶台阶。',
      '那天放学后下了一场金色的雨，每一颗雨滴落地后都变成了一朵小小的发光蘑菇，{name}好奇地跟着蘑菇的光走去。',
      '当{name}在阁楼里发现外婆留下的那面银色镜子时，镜子里出现了一个戴着星星帽的小精灵。',
      '"你被选中了！"一只会说话的猫头鹰降落在{name}的窗台上，翅膀上闪着蓝色的魔法光芒。',
      '{name}在河边捡到一块奇怪的石头，石头上刻着一行谁也看不懂的文字——直到月光照到上面，文字亮了起来。'
    ],
    twists: [
      '穿过一道彩虹拱门，{name}来到了一座漂浮在云端的城堡。城堡的守卫是一群只有手掌大小的仙子。',
      '一条银色的龙从天而降，它说自己已经等了{name}一百年。原来，{name}是古老预言中提到的那个孩子。',
      '森林中央有一棵巨大的世界树，每片叶子上都记录着一个人的梦想。{name}找到了自己的那片叶子，上面写着……',
      '一面隐形的墙挡住了去路，{name}想起魔法书上的一句话，大声念出了咒语。墙壁化作了一群蝴蝶飞散开来。',
      '突然，地面震动起来，一座沉睡了千年的古老图书馆从地底缓缓升起，门口的石像眨了眨眼。',
      '一个黑影出现在前方——是传说中的影子巫师！但{name}发现它似乎在求救，而不是要攻击。',
      '魔法指南针开始疯狂旋转，每转一圈周围的景色就变一次：从冰雪荒原到火山深处，再到海底王国。',
      '一首旋律从远处传来，{name}发现循着音乐走，脚下的石头会自动排列成道路。'
    ],
    endings: [
      '冒险结束后，{name}发现自己躺在家里的床上。但枕头旁多了一颗真实的星辰宝石，微微发着光。这一切都是真的。',
      '回到现实世界的{name}微笑着望向天空。从此以后，每当夜空中最亮的那颗星闪烁时，{name}就知道——朋友们在另一个世界向自己问好。',
      '{name}轻轻合上了那本魔法书。虽然冒险暂时结束了，但书的最后一页上出现了新的文字："下一章，即将开启……"',
      '"勇敢不是不害怕，而是害怕了还能往前走。"{name}把这句在冒险中学到的话写在日记里，准备迎接新的一天。',
      '精灵王为{name}戴上了一枚看不见的勇气勋章。从此，每当遇到困难，{name}的心口都会微微发暖——那是勇气的力量。',
      '那个奇妙的世界并没有消失，它就藏在每一本书的字里行间，等待着有想象力的人去发现。{name}已经等不及要开始下一次冒险了。'
    ]
  },

  /* ---- 太空探索 ---- */
  space: {
    titles: ['星际漫游日记', '月球基地的秘密', '来自仙女座的信号', '小小宇航员的第一天', '银河列车之旅', '土星环上的神秘城市'],
    openings: [
      '公元 2124 年，{name}坐在"星光号"飞船的驾驶舱里，透过巨大的舷窗看到了蓝色的地球正在变小。',
      '"倒计时开始！5、4、3、2、1——发射！"随着一声巨响，{name}乘坐的火箭冲出了大气层，星星在四周亮了起来。',
      '{name}的手表突然发出了一串奇怪的信号。经过翻译，那是来自一颗遥远星球的求助信息：{name}，我们需要你的帮助。',
      '太空学校的毕业典礼上，{name}收到了一个意想不到的任务——独自驾驶飞船前往从未有人类到达过的星球。',
      '当{name}在月球基地的实验室检查样本时，显微镜下出现了不可思议的景象：那些晶体在自己移动！',
      '太空电梯的门打开的一瞬间，{name}的呼吸都停了——外面不是预期的太空站，而是一片完全未知的星域。'
    ],
    twists: [
      '飞船突然被一束神秘的蓝色光束牵引，{name}被带到了一座隐藏在小行星带中的巨大太空城市。',
      '一个全身发着柔和绿光的外星朋友出现了。它用一种奇妙的方式交流——不用说话，而是通过分享彩色的光球来传递想法。',
      '飞船的 AI 助手突然说："检测到前方有一个虫洞。要穿越吗？"穿越的另一头可能是十万光年之外的未知世界。',
      '在一颗全是水晶的星球上，{name}发现水晶里记录着宇宙诞生时的影像，就像一部最古老的电影。',
      '{name}的宇航服上的生命探测器发出了"嘟嘟"声。在这颗看似荒凉的星球地下，似乎有某种生命在活动。',
      '太空站的重力系统出了故障，所有东西都飘了起来。{name}必须在零重力下完成修复任务。',
      '一颗陨石差点撞上飞船！{name}紧急启动了防护罩，却发现那颗"陨石"其实是一颗人造的时间胶囊。',

    ],
    endings: [
      '飞船降落在校园操场上时，同学们都惊呆了。但{name}只是微微一笑——真正的太空探索者从不炫耀，因为宇宙教会了谦逊。',

      '太空日记的最后一页，{name}写道："宇宙比我们想象的更大、更美、更有趣。而最棒的是，探索才刚刚开始。"',

      '"地球很小，但地球上的梦想很大。"{name}在太空中学到的这句话，成了这次旅行最珍贵的纪念品。',

    ]
  },

  /* ---- 校园趣事 ---- */
  school: {
    titles: ['课堂上的奇妙实验', '运动会大逆转', '图书馆的秘密通道', '最特别的一堂课', '校园美食节大作战', '社团招新奇遇记'],
    openings: [

    twists: [

      '美食节比赛中，{name}的小组做的菜不小心翻车了。但{name}灵机一动，把"失败品"重新摆盘，取名"抽象派料理"，竟然获得了创意大奖。',

    ],
    endings: [
      '放学铃响了，{name}背起书包，忍不住回头望了望教室。"学校比我想的有趣多了。"明天，又会发生什么呢？',
      '{name}把今天的经历写成了一篇作文，标题是《最不普通的普通一天》。语文老师看完后给了满分，评语是："真实的生活就是最好的故事。"',

/* ========== 工具函数：随机取数组元素 ========== */
function pick(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

/* ========== 生成故事 ========== */
function generateStory() {
  // 中断之前的打字效果
  if (typewriterTimer) {
    clearTimeout(typewriterTimer);
    typewriterTimer = null;
  }

  const nameInput = document.getElementById('heroName');
  const name = nameInput.value.trim() || '小明';
  const data = storyData[currentType];

  // 随机选取素材并替换名字占位符
  const title = pick(data.titles);
  const opening = pick(data.openings).replace(/{name}/g, name);

  // 随机选 1-2 段发展情节
  const twistCount = Math.random() > 0.5 ? 2 : 1;
  const usedTwists = [];
  while (usedTwists.length < twistCount) {
    const t = pick(data.twists);
    if (!usedTwists.includes(t)) usedTwists.push(t);
  }
  const twists = usedTwists.map(t => t.replace(/{name}/g, name));

  const ending = pick(data.endings).replace(/{name}/g, name);

  // 组装段落
  const paragraphs = [opening, ...twists, ending];

  // 显示故事区域
  const section = document.getElementById('storySection');
  section.classList.add('show');

  const storyCard = document.getElementById('storyCard');
  storyCard.classList.remove('finished');

  document.getElementById('storyTitle').textContent = title;

  // 开始打字效果
  typewriterEffect(paragraphs);

  // 滚动到故事区域
  section.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

/* ========== 打字机效果 ========== */
function typewriterEffect(paragraphs) {
  const body = document.getElementById('storyBody');
  body.innerHTML = '';
  isTyping = true;

  let pIndex = 0;    // 当前段落索引
  let cIndex = 0;    // 当前字符索引
  let currentP = null; // 当前段落的 DOM 元素

  function typeNext() {
    // 如果所有段落都已打完
    if (pIndex >= paragraphs.length) {
      // 移除光标
      const cursor = body.querySelector('.cursor');
      if (cursor) cursor.remove();
      isTyping = false;
      document.getElementById('storyCard').classList.add('finished');
      return;
    }

    // 新段落开始
    if (cIndex === 0) {
      // 如果不是第一段，添加分隔符
      if (pIndex > 0) {
        const sep = document.createElement('div');
        sep.className = 'separator';
        sep.textContent = '* * *';
        body.appendChild(sep);
      }
      currentP = document.createElement('p');
      body.appendChild(currentP);
    }

    const text = paragraphs[pIndex];

    if (cIndex < text.length) {
      // 移除旧光标
      const oldCursor = body.querySelector('.cursor');
      if (oldCursor) oldCursor.remove();

      // 添加下一个字符
      currentP.textContent = text.substring(0, cIndex + 1);

      // 添加光标
      const cursor = document.createElement('span');
      cursor.className = 'cursor';
      currentP.appendChild(cursor);

      cIndex++;

      // 速度：标点稍慢，正常字快一些
      const char = text[cIndex - 1];
      const isPunctuation = '，。！？、；：""'''.includes(char);
      const delay = isPunctuation ? 120 : 40;

      typewriterTimer = setTimeout(typeNext, delay);
    } else {
      // 当前段落打完，进入下一段
      const oldCursor = body.querySelector('.cursor');
      if (oldCursor) oldCursor.remove();
      pIndex++;
      cIndex = 0;
      typewriterTimer = setTimeout(typeNext, 300);
    }
  }

  typeNext();
}

/* ========== 复制故事 ========== */
function copyStory() {
  const title = document.getElementById('storyTitle').textContent;
  const body = document.getElementById('storyBody');
  // 获取纯文本，每段之间用换行分隔
  const paragraphs = body.querySelectorAll('p');
  let text = title + '\n\n';
  paragraphs.forEach(p => {
    text += p.textContent.replace(/\n/g, '') + '\n\n';
  });

  navigator.clipboard.writeText(text.trim()).then(() => {
    const toast = document.getElementById('copyToast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }).catch(() => {
    // 降级方案：使用 textarea
    const ta = document.createElement('textarea');
    ta.value = text.trim();
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    const toast = document.getElementById('copyToast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  });
}
